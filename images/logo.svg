<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4FACFE"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1E40AF" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Main cloud + speech bubble shape -->
  <g filter="url(#shadow)">
    <!-- Cloud body - rounder, more natural -->
    <path d="
      M410 230
      c0-55-45-100-100-100
      c-20 0-38 6-54 16
      C240 108 200 80 155 80
      C95 80 46 129 46 189
      c0 8 1 15 2 22
      C20 224 2 250 2 280
      c0 50 40 90 90 90
      l260 0
      c55 0 100-45 100-100
      c0-20-6-38-16-54
      C424 268 440 230 410 230z
    " fill="url(#bg)"/>

    <!-- Speech bubble tail -->
    <path d="M100 365 L50 440 L160 375" fill="url(#bg)"/>
  </g>

  <!-- Bar chart - 3 ascending bars -->
  <rect x="148" y="260" width="48" height="80" rx="8" fill="white" opacity="0.92"/>
  <rect x="216" y="215" width="48" height="125" rx="8" fill="white" opacity="0.92"/>
  <rect x="284" y="165" width="48" height="175" rx="8" fill="white" opacity="0.92"/>

  <!-- Upward trend arrow -->
  <path d="M172 248 L240 200 L308 152" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>
  <path d="M290 145 L315 140 L318 165" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>
</svg>